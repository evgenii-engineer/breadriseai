name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install
        run: npm ci

      # Custom domain (public/CNAME) → site is served from the root, so the
      # base path must be empty. Otherwise fall back to the value derived by
      # Configure Pages (e.g. "/<repo>" for project pages on github.io).
      - name: Resolve base path
        id: basepath
        run: |
          if [ -f public/CNAME ]; then
            echo "Custom domain detected (public/CNAME) → using empty base path"
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "No CNAME → using base path from Configure Pages: '${{ steps.pages.outputs.base_path }}'"
            echo "value=${{ steps.pages.outputs.base_path }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.basepath.outputs.value }}
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
