<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="vg" cx="55%" cy="38%" r="70%">
      <stop offset="0%"  stop-color="#fff7ea"/>
      <stop offset="35%" stop-color="#dccdb1"/>
      <stop offset="78%" stop-color="#5a4634"/>
      <stop offset="100%" stop-color="#1a120a"/>
    </radialGradient>
    <filter id="n3">
